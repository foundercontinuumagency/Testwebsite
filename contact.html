<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Continuum Agency</title>
    <link rel="stylesheet" href="./style.css?v=2026.1">
    <meta name="description" content="Get in touch with Continuum Agency to supercharge your startup's growth.">
</head>
<body class="page-contact">
    <div class="bg-grid"></div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="brand-logo">
                <img src="logo.png" alt="Logo">
                
            </a>
            <button class="mobile-menu-btn">☰</button>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="our-work.html">Our Work</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="how-it-works.html">How It Works</a></li>
                <li><a href="contact.html" class="active">Contact Us</a></li>
            </ul>
        </div>
    </nav>

    <div style="padding-top: var(--nav-height);"></div>

    <section class="section">
        <div class="container text-center fade-up">
            <h1 class="heading-xl">Let's Build.</h1>
            <p class="subtext mx-auto" style="margin: 0 auto 3rem;">Ready to scale? Drop us a message.</p>
        </div>

        <div class="container fade-up delay-1">
            <div class="contact-box">
                <div class="contact-info">
                    <div class="info-item">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent-primary)" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                        <span>+91 8619102101</span>
                    </div>
                    <div class="info-item">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent-primary)" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                        <span>founder.continuumagency@gmail.com</span>
                    </div>
                </div>

                <form action="mailto:founder.continuumagency@gmail.com" method="POST" enctype="text/plain">
                    <div class="form-group">
                        <label class="form-label">Name</label>
                        <input type="text" name="Name" class="form-input" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Startup / Company</label>
                        <input type="text" name="Company" class="form-input" required placeholder="Acme Corp">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Message</label>
                        <textarea name="Message" class="form-input" required placeholder="How can we help you grow?"></textarea>
                    </div>
                    <button type="submit" class="cta-button primary" style="width: 100%; border: none; font-family: var(--font-body); font-size: 1.1rem; cursor: pointer; margin-top: 1rem;">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer" style="margin-top: 5rem;">
        <div class="container footer-content">
            <div class="footer-nav">
                <a href="index.html">Home</a>
                <a href="services.html">Services</a>
                <a href="our-work.html">Our Work</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </div>
            <p class="copyright">© 2026 Continuum Agency. All rights reserved.</p>
        </div>
    </footer>

    <script src="./script.js"></script>
</body>
</html>
